services:
  - type: web
    name: cypher-c-bot
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OWNER_NUMBER
        sync: false
      - key: APP_URL
        sync: false
